apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: nexoryx-security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:11.1.0
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: security-secrets
              key: GRAFANA_ADMIN_PASSWORD
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 20
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: nexoryx-security
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
