apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh
  namespace: nexoryx-security
spec:
  serviceName: wazuh
  replicas: 1
  selector:
    matchLabels:
      app: wazuh
  template:
    metadata:
      labels:
        app: wazuh
    spec:
      containers:
      - name: wazuh
        image: wazuh/wazuh:4.8.1
        ports:
        - containerPort: 1514
        - containerPort: 55000
        readinessProbe:
          tcpSocket:
            port: 55000
          initialDelaySeconds: 30
        livenessProbe:
          tcpSocket:
            port: 55000
          initialDelaySeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: wazuh
  namespace: nexoryx-security
spec:
  selector:
    app: wazuh
  ports:
  - port: 55000
